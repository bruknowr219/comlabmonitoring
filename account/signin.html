<body>

    <div class="container animate__animated animate__bounceIn">
    <img src="logo.png" alt="logo" class="logo">
    <h1> Welcome Back </h1>
   
    <p class="details">Log in to manage your computer lab with real-time monitoring and secure administration.</p>  
   
 
</div>




<div class="form animate__animated animate__bounceIn">
<h1>Sign in</h1>
   
    <form action="" >
      <label id="user-label" for="uname">Username</label>
      <input type = "text" id="uname" placeholder="Username" required ></span>
      <label id="pass-label" for="pass">Password</label>
      <input type = "password" id="pass" placeholder="Password" required ></span>
    </form>
    
<div class="information ">
        <p id="errormessage" style="height: 20px;"></p>
        <button id="submitbtn" class="bubbles">
  <span  class="text">Log In</span>
</button>
        <p id="showpass">show password</p>
        <p id="forgotpass"><a href="forgot/forgot-password.html" style="color: rgb(243, 174, 252);">forgot password?</a></p>
        <p >Don't have an account?  <a href="../account/signup/signup.html" style="color: rgb(243, 174, 252);">Sign up</a></p>
</div>
