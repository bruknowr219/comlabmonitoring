<html>


<head>
    <title>Sign up | Comlab Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
     <link rel="shortcut icon" href="../../pictures/computerlab.png"></link>



</head>

<a href="../../index.html" class="home" > <i class="bi bi-arrow-left-circle-fill"></i> back to home</a>

<body>
<div class="container animate__animated animate__bounceIn">
    <img src="../logo.png" alt="logo" class="logo">
    <h1> Join ComLab Monitoring System </h1>
   
    <p class="details">Start managing your computer lab with real-time monitoring and secure administration.</p>  
   
 
</div>



<div class="form animate__animated animate__bounceIn">
<h1>Sign up</h1>
   
    <form action="" >
      <label id="user-label" for="uname">Username</label>
      <input type = "text" id="uname" placeholder="Username" required ></span>
      <label id="email-label" for="email">Email</label>
      <input type = "email" id="email" placeholder="Email" required ></span>
      <label id="pass-label" for="pass">Password</label>
      <input type = "password" id="pass" placeholder="Password" required ></span>
      <label id="confirmpass-label" for="confirmpass">Confirm Password</label>
      <input type="password" id="confirmpass" placeholder="Confirm Password" required> </span> 
      
    </form>
    
    
<div class="information ">
        <p id="errormessage" style="height: 20px;"></p>
        <button id="submitbtn" class="bubbles">
  <span  class="text">Sign Up</span>
</button>
        <p id="showpass">show password</p>
       
        <p >Already have an account?  <a href="../signin.html" style="color: rgb(243, 174, 252);">Sign in</a></p>
</div>




<script src="script.js"></script>




</div>

</div>


</body>

</html>
